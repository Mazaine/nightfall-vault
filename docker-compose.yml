name: nightfall-vault

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Nightfall Vault API}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your local .env file}
      BACKEND_CORS_ORIGINS: '["http://localhost:5173"]'
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your local .env file}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-turnstile}
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      ORDER_ADMIN_EMAIL: ${ORDER_ADMIN_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in your local .env file}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in your local .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
