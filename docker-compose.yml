services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webshop-template-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webshop-template-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      PROJECT_NAME: Webshop Template API
      DATABASE_URL: postgresql+psycopg://webshop_template:webshop_template@postgres:5432/webshop_template
      BACKEND_CORS_ORIGINS: '["http://localhost:5173"]'
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: webshop-template-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: webshop_template
      POSTGRES_USER: webshop_template
      POSTGRES_PASSWORD: webshop_template
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webshop_template -d webshop_template"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: webshop-template-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
