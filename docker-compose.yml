name: nightfall-vault

services:
  frontend:
    init: true
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_CAPTCHA_PROVIDER: ${VITE_CAPTCHA_PROVIDER:-turnstile}
      VITE_CAPTCHA_ENABLED: ${VITE_CAPTCHA_ENABLED:-false}
      VITE_CAPTCHA_SITE_KEY: ${VITE_CAPTCHA_SITE_KEY:-}
      VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    init: true
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - nightfall_media:/data/media
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-Nightfall Vault API}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your local .env file}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:?Set TEST_DATABASE_URL in your local .env file}
      BACKEND_CORS_ORIGINS: '["http://localhost:5173"]'
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your local .env file}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-turnstile}
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      ORDER_ADMIN_EMAIL: ${ORDER_ADMIN_EMAIL:-}
      AUCTION_SCHEDULER_MODE: external
      TRANSACTION_REVIEW_WINDOW_DAYS: ${TRANSACTION_REVIEW_WINDOW_DAYS:-30}
      MODERATION_STRIKE_ALERT_THRESHOLD: ${MODERATION_STRIKE_ALERT_THRESHOLD:-3}
      MEDIA_ROOT: /data/media
      MEDIA_URL_PREFIX: ${MEDIA_URL_PREFIX:-/media}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10

  auction-scheduler:
    init: true
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your local .env file}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-text}
      AUCTION_SCHEDULER_MODE: worker
      AUCTION_SCHEDULER_INTERVAL_SECONDS: ${AUCTION_SCHEDULER_INTERVAL_SECONDS:-10}
      AUCTION_SCHEDULER_HEARTBEAT_TTL_SECONDS: ${AUCTION_SCHEDULER_HEARTBEAT_TTL_SECONDS:-30}
      TRANSACTION_REVIEW_WINDOW_DAYS: ${TRANSACTION_REVIEW_WINDOW_DAYS:-30}
    command: ["python", "-m", "app.workers.auction_scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.workers.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in your local .env file}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in your local .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-nightfall_vault_test}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in your local .env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your local .env file}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  nightfall_media:
    name: nightfall_vault_media
