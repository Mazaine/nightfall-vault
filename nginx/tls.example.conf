# Host Nginx template for Ubuntu + Certbot. Do not copy without replacing the domain.
# The container reverse proxy binds only to 127.0.0.1:8080.
server {
    listen 80;
    listen [::]:80;
    server_name CHANGE_ME_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name CHANGE_ME_DOMAIN;

    ssl_certificate /etc/letsencrypt/live/CHANGE_ME_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CHANGE_ME_DOMAIN/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # Enable only after HTTPS and renewal have been verified.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
