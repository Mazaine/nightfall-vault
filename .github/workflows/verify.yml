name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Prepare isolated CI configuration
        run: |
          cp .env.example .env
          printf '\nDATABASE_URL=postgresql+psycopg://nightfall_vault_dev:replace-with-generated-development-password@postgres:5432/nightfall_vault_dev\n' >> .env
          printf '\nTEST_DATABASE_URL=postgresql+psycopg://nightfall_vault_dev:replace-with-generated-development-password@postgres-test:5432/nightfall_vault_test\n' >> .env
      - name: Build and start services
        run: docker compose up -d --build
      - name: Bootstrap or migrate database
        run: docker compose exec -T backend python -m app.scripts.bootstrap_database
      - name: Verify fresh database baseline
        run: |
          docker compose exec -T postgres-test psql -U nightfall_vault_dev -d nightfall_vault_test -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          docker compose exec -T backend sh -c 'DATABASE_URL="$TEST_DATABASE_URL" alembic upgrade head'
      - name: Run backend tests
        run: docker compose exec -T backend pytest
      - name: Run frontend tests
        run: docker compose exec -T frontend npm run test
      - name: Build frontend
        run: docker compose exec -T frontend npm run build
      - name: Service diagnostics
        if: failure()
        run: docker compose ps && docker compose logs --no-color --tail=200

  production-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts and tracked secrets
        run: |
          bash -n scripts/*.sh scripts/lib/*.sh
          bash scripts/secret_scan.sh
          python scripts/test_production_contract.py
      - name: Validate production Compose
        env:
          PRODUCTION_ENV_FILE: .env.production.example
          POSTGRES_DB: nightfall_vault
          POSTGRES_USER: nightfall_app
          POSTGRES_PASSWORD: ci-placeholder
          REDIS_PASSWORD: ci-placeholder
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml config --quiet
      - name: Build production images
        env:
          PRODUCTION_ENV_FILE: .env.production.example
          POSTGRES_DB: nightfall_vault
          POSTGRES_USER: nightfall_app
          POSTGRES_PASSWORD: ci-placeholder
          REDIS_PASSWORD: ci-placeholder
        run: docker compose --env-file .env.production.example -f docker-compose.production.yml build backend frontend reverse-proxy
      - name: Test Nginx production configuration
        run: docker run --rm --add-host backend:127.0.0.1 --add-host frontend:127.0.0.1 nightfall-vault-proxy:local nginx -t
